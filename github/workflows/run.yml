name: Run ATM We Wealth

on:
  workflow_dispatch:        # lo lanci a mano dal tab Actions

jobs:
  run-atm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (se servono)
        run: |
          npm install || echo "Nessun package.json, salto install"

      - name: Run atm-we-wealth.js
        run: node atm-we-wealth.js

